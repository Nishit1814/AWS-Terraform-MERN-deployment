server {
    listen 80;

    # Catch-all server name
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Frontend Route Handling (React SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Reverse Proxy for ALL Backend API Routes
    # This regex catches /user, /trip, /payments, /api, etc., and forwards them!
    location ~ ^/(user|trip|payments|upload|history|messages|review|api|cancellation|notifications) {
        # Use Docker's internal DNS (mern_backend) instead of the public EC2 IP
        proxy_pass http://mern_backend:5000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 3. Dedicated WebSocket Handling for Socket.io
    location /socket.io/ {
        proxy_pass http://mern_backend:5000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
